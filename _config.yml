# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Deep Generative Models
author: Davide Evangelista
logo: logo.png

execute:
  # Use outputs already stored in the notebooks. Do not execute cells while building.
  execute_notebooks: "off"
  allow_errors: true

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

exclude_patterns:
  - GUIDE.md
  - STATUS.md
  - TODO_12H_PHD_COURSE.md
  - 00-overview/index.ipynb
  - 04-variational-autoencoders/implementation.ipynb
  - 05-gans/implementation-and-variants.ipynb
  - 06-diffusion-models/implementation.ipynb
  - _build/**

# Information about where the book exists on the web
repository:
  url: https://github.com/devangelista2/deep-generative-models
  path_to_book: .
  branch: main

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  extra_css:
    - _static/custom.css
  home_page_in_navbar: false
  favicon: logo.png

sphinx:
  extra_extensions:
    - sphinx_proof
  config:
    html_js_files:
      - custom.js
